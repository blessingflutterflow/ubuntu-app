name: ubuntuflutter
description: "Ubuntu Oasis - Social Media App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.13.1
  firebase_auth: ^5.5.3
  cloud_firestore: ^5.6.6
  firebase_storage: ^12.4.5
  firebase_messaging: ^15.2.5
  firebase_database: ^11.3.5

  # Images & Media
  cached_network_image: ^3.4.1
  video_player: ^2.9.2
  image_picker: ^1.1.2

  # Navigation
  go_router: ^14.8.1

  # Utils
  intl: ^0.19.0
  shimmer: ^3.0.0
  flutter_local_notifications: ^18.0.1
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
